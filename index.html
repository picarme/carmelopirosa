<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmelo Pirosa | Systems Engineer</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0b0f1a, #020617);
  color: #e6edf3;
  scroll-behavior: smooth;
  overflow-x: hidden;
}

/* BACKGROUND */
<div id="vanta-bg" style="position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: -1;"></div>

/* Ensure content stays above particles */
nav, header, .container, footer {
  position: relative;
  z-index: 1;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: center;
  padding: 15px;
  background: rgba(10,15,28,0.85);
  backdrop-filter: blur(10px);
  z-index: 100;
}

nav a {
  margin: 0 15px;
  color: #9ca3af;
  text-decoration: none;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: #4fd1c5;
}

/* HERO */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 50px;
  flex-wrap: wrap;
  padding: 0 20px;
}

.hero-text {
  max-width: 500px;
}

.hero-text h1 {
  font-size: 3.5rem;
  margin: 0;
  background: linear-gradient(90deg, #4fd1c5, #60a5fa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero-text h2 {
  font-size: 1.5rem;
  color: #e6edf3;
  margin-top: 5px;
  margin-bottom: 15px;
}

.hero-text p {
  color: #9ca3af;
  font-size: 1.1rem;
  line-height: 1.6;
}

.hero-image img {
  width: 220px;
  height: 220px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #4fd1c5;
  box-shadow: 0 0 25px rgba(79,209,197,0.4);
}

/* BUTTONS */
.hero-buttons {
  display: flex;
  gap: 15px;
  margin-top: 25px;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 1rem;
  text-decoration: none;
  transition: 0.3s;
  display: inline-block;
}

/* Primary */
.btn.primary {
  background: linear-gradient(90deg, #4fd1c5, #60a5fa);
  color: #020617;
  font-weight: bold;
}

/* Outline */
.btn.outline {
  border: 1px solid #4fd1c5;
  color: #4fd1c5;
  font-weight: bold;
}

.btn:hover {
  transform: translateY(-3px);
  opacity: 0.9;
  box-shadow: 0 4px 15px rgba(79,209,197,0.3);
}

/* CONTAINER */
.container {
  max-width: 1000px;
  margin: auto;
  padding: 80px 20px 40px;
}

section {
  margin-bottom: 60px;
}

/* CARDS GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: rgba(17, 24, 39, 0.8);
  backdrop-filter: blur(5px);
  padding: 25px;
  border-radius: 12px;
  border: 1px solid #1f2937;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(79,209,197,0.15);
  border-color: #374151;
}

.card h3 {
  margin-top: 0;
  color: #e6edf3;
}

.card p {
  color: #9ca3af;
  line-height: 1.5;
}

.card ul {
  color: #9ca3af;
  padding-left: 20px;
}

.card a {
  color: #4fd1c5;
  text-decoration: none;
  font-weight: bold;
  display: inline-block;
  margin-top: 10px;
}

.card a:hover {
  text-decoration: underline;
}

/* TITLES */
h2 {
  color: #4fd1c5;
  font-size: 2rem;
  border-bottom: 2px solid #1f2937;
  padding-bottom: 10px;
  margin-bottom: 25px;
}

/* TAG */
.tag {
  display: inline-block;
  background: #1f2937;
  color: #d1d5db;
  padding: 6px 12px;
  margin: 4px;
  border-radius: 6px;
  font-size: 0.9rem;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 40px;
  color: #6b7280;
  border-top: 1px solid #1f2937;
  background: rgba(10,15,28,0.9);
}

/* RESPONSIVE NAV */
@media (max-width: 768px) {
  nav {
    flex-wrap: wrap;
    font-size: 0.9rem;
  }
  nav a {
    margin: 5px 10px;
  }
}
</style>
</head>

  <a href="#github">GitHub</a>
  <a href="#contact">Contact</a>
</nav>

    <div class="hero-text">
